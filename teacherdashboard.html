<!DOCTYPE html>

<html>

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>AI storytelling workshop</title>
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light px-5 fixed-top">
        <div>
            <a class="navbar-brand" href="https://future-leaders-union.odoo.com/zh_TW" target="_blank">
                <img class="mx-4" src="./images/FLU_logo2.png" width="100" class="d-inline-block align-top" alt="">
            </a>
            <a href="https://www.bokss.org.hk/">
                <img src="https://www.bokss.org.hk/images/logo.png" height="60" class="d-inline-block align-top "
                    style="padding:5px; margin-top:8px" alt="" target="_blank"></a>
        </div>

        <span id="userIdDisplay" class="text-secondary me-3"> 學生提交箱</span>
        <span id="votesRemainingDisplay" class="text-secondary me-3 d-none"></span>


        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="justify-content-end collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav ml-auto mx-2">
                <li class="nav-item active">
                    <a class="nav-link" href="index.html">主頁</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="classppt.html">教學簡報</a>
                </li>
                <li class="nav-item" id="teacherArea">
                    <a class="nav-link" href="teacherdashboard.html" target="_blank">學生提交箱</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="portfolio/studentproject.html">學生作品</a>
                </li>
                <button onclick="logout()" class="btn btn-secondary" style="display: none;" id="logoutBtn">登出</button>
            </ul>
        </div>
    </nav>

    <div class="container" style="margin-top: 90px;">
        <div class="row mb-4">
            <!-- Filter Controls -->
            <div class="col-md-4">
                <label for="userFilter" class="form-label">Filter by User ID:</label>
                <input type="text" class="form-control" id="userFilter" placeholder="Enter User ID">
            </div>
            <div class="col-md-4">
                <label for="workshopFilter" class="form-label">Filter by Workshop:</label>
                <select class="form-select" id="workshopFilter">
                    <option value="">All Workshops</option>
                    <option value="ws1">Workshop 1</option>
                    <option value="ws2">Workshop 2</option>
                    <option value="ws3">Workshop 3</option>
                </select>
            </div>
            <div class="col-md-4">
                <label for="contentTypeFilter" class="form-label">Content Type:</label>
                <select class="form-select" id="contentTypeFilter">
                    <option value="">All Content</option>
                    <option value="image">Images</option>
                    <option value="text">Text Submissions</option>
                </select>
            </div>
        </div>

        <!-- Unified Submissions Display -->
        <div class="row" id="submissionsContainer" style="max-height: calc(100vh - 250px); overflow-y: auto;">
            <!-- All submissions (images and text) will be displayed here as cards -->
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getStorage, ref, listAll, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-storage.js";
        import { getFirestore, collection, getDocs, query, orderBy, deleteDoc, doc, setDoc } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";

        // Your Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyC-yuLzNuwAI9WjtaTczyIU371Ircbw31M",
            authDomain: "iw01-bokss-260303.firebaseapp.com",
            projectId: "iw01-bokss-260303",
            storageBucket: "iw01-bokss-260303.firebasestorage.app",
            messagingSenderId: "778796723219",
            appId: "1:778796723219:web:577576c889cdf8f252a3e6",
            measurementId: "G-60Q26SB1LJ"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const storage = getStorage(app);
        const db = getFirestore(app);

        // Reference to the stories folder
        const storiesRef = ref(storage, 'stories');

        const MAX_VOTES_PER_USER = 3;
        function getVotesCollection() { return collection(db, 'votes'); }
        function getVoteDocId(voterId, submissionId) {
            return 'v_' + voterId + '_' + String(submissionId).replace(/\//g, '_').slice(0, 200);
        }

        let allImages = []; // Store all images data
        let allTextSubmissions = []; // Store all text submissions data
        let allSubmissions = []; // Combined array for unified display
        let voteCountBySubmissionId = {}; // submissionId -> number of votes
        let userVotedSubmissionIds = new Set(); // submissionIds the current user has voted for

        // Function to load all images
        async function loadImages() {
            try {
                const result = await listAll(storiesRef);
                allImages = await Promise.all(
                    result.items.map(async (item) => {
                        const url = await getDownloadURL(item);
                        const name = item.name;
                        // Parse filename to get userId and workshop
                        const [userId, workshop] = name.split('_');
                        return {
                            url,
                            name,
                            userId,
                            workshop,
                            type: 'image',
                            id: name,
                            timestamp: new Date() // Images don't have timestamps, use current date
                        };
                    })
                );
                updateCombinedSubmissions();
            } catch (error) {
                console.error("Error loading images:", error);
            }
        }

        // Function to load all text submissions
        async function loadTextSubmissions() {
            try {
                const submissionsRef = collection(db, 'submissions');
                const q = query(submissionsRef, orderBy('timestamp', 'desc'));
                const querySnapshot = await getDocs(q);

                allTextSubmissions = querySnapshot.docs.map(doc => {
                    const data = doc.data();
                    return {
                        id: doc.id,
                        userId: data.userId,
                        section: data.section,
                        content: data.content,
                        workshop: data.workshop,
                        timestamp: data.timestamp?.toDate?.() || new Date(),
                        type: 'text'
                    };
                });
                updateCombinedSubmissions();
            } catch (error) {
                console.error("Error loading text submissions:", error);
            }
        }

        // Function to combine and update all submissions
        function updateCombinedSubmissions() {
            allSubmissions = [...allImages, ...allTextSubmissions];
            allSubmissions.sort((a, b) => b.timestamp - a.timestamp);
            loadVotes();
        }

        // Load votes from Firestore and then redraw cards
        async function loadVotes() {
            const uid = localStorage.getItem('currentUserId');
            voteCountBySubmissionId = {};
            userVotedSubmissionIds = new Set();
            try {
                const snap = await getDocs(getVotesCollection());
                snap.docs.forEach((d) => {
                    const data = d.data();
                    const sid = data.submissionId;
                    if (!sid) return;
                    voteCountBySubmissionId[sid] = (voteCountBySubmissionId[sid] || 0) + 1;
                    if (data.voterId === uid) userVotedSubmissionIds.add(sid);
                });
            } catch (err) {
                console.error('Error loading votes:', err);
            }
            filterAndDisplaySubmissions();
            updateVotesRemainingDisplay();
        }

        function updateVotesRemainingDisplay() {
            const el = document.getElementById('votesRemainingDisplay');
            const uid = localStorage.getItem('currentUserId');
            if (!el) return;
            if (!uid) {
                el.classList.add('d-none');
                return;
            }
            el.classList.remove('d-none');
            const used = userVotedSubmissionIds.size;
            el.textContent = `你的票數: ${used}/${MAX_VOTES_PER_USER}`;
        }

        // Only the same user can delete their own image/submission
        function getUserIdFromFilename(name) {
            return name ? name.split('_')[0] : '';
        }

        // Function to filter and display all submissions
        function filterAndDisplaySubmissions() {
            const userFilter = document.getElementById('userFilter').value.toLowerCase();
            const workshopFilter = document.getElementById('workshopFilter').value;
            const contentTypeFilter = document.getElementById('contentTypeFilter').value;
            const loggedInUserId = localStorage.getItem('currentUserId');

            const filteredSubmissions = allSubmissions.filter(submission => {
                const matchesUser = !userFilter || submission.userId.toLowerCase().includes(userFilter);
                const matchesWorkshop = !workshopFilter || submission.workshop === workshopFilter;
                const matchesContentType = !contentTypeFilter || submission.type === contentTypeFilter;
                return matchesUser && matchesWorkshop && matchesContentType;
            });

            const container = document.getElementById('submissionsContainer');
            container.innerHTML = '';

            filteredSubmissions.forEach(submission => {
                const col = document.createElement('div');
                col.className = 'col-md-4 mb-4';
                const canDelete = loggedInUserId && submission.userId === loggedInUserId;
                const submissionId = submission.id;
                const voteCount = voteCountBySubmissionId[submissionId] || 0;
                const isOwn = loggedInUserId && submission.userId === loggedInUserId;
                const hasVotedThis = userVotedSubmissionIds.has(submissionId);
                const votesLeft = MAX_VOTES_PER_USER - userVotedSubmissionIds.size;
                const canVote = loggedInUserId && !isOwn && !hasVotedThis && votesLeft > 0;
                const canUnvote = loggedInUserId && hasVotedThis;
                const voteBtnHtml = canVote
                    ? `<button class="btn btn-outline-primary btn-sm vote-btn" data-submission-id="${submissionId.replace(/"/g, '&quot;')}" data-target-user-id="${submission.userId}" data-submission-type="${submission.type}"><i class="fas fa-thumbs-up"></i> Vote</button>`
                    : '';
                const unvoteBtnHtml = canUnvote
                    ? `<button class="btn btn-outline-secondary btn-sm unvote-btn" data-submission-id="${submissionId.replace(/"/g, '&quot;')}"><i class="fas fa-thumbs-down"></i> Unvote</button>`
                    : '';

                if (submission.type === 'image') {
                    col.innerHTML = `
                        <div class="card h-100">
                            <img src="${submission.url}" class="card-img-top" alt="Student submission" style="height: 200px; object-fit: cover;">
                            <div class="card-body d-flex flex-column">
                                <h5 class="card-title">User ID: ${submission.userId}</h5>
                                <p class="card-text"><strong>Type:</strong> Image</p>
                                <p class="card-text"><strong>Workshop:</strong> ${submission.workshop}</p>
                                <p class="card-text"><strong>Filename:</strong> ${submission.name}</p>
                                <p class="card-text"><strong>Timestamp:</strong> ${submission.timestamp.toLocaleString()}</p>
                                <p class="card-text mb-1"><strong>Votes:</strong> <span class="vote-count" data-submission-id="${submissionId.replace(/"/g, '&quot;')}">${voteCount}</span></p>
                                <div class="mt-auto d-flex flex-wrap gap-1">
                                    ${voteBtnHtml}
                                    ${unvoteBtnHtml}
                                    ${canDelete ? `
                                    <button class="btn btn-danger delete-btn" data-filename="${submission.name}" data-user-id="${submission.userId}">
                                        <i class="fas fa-trash"></i> Delete
                                    </button>
                                    ` : '<span class="text-muted small">只能刪除自己的圖片</span>'}
                                </div>
                            </div>
                        </div>
                    `;
                } else {
                    col.innerHTML = `
                        <div class="card h-100">
                            <div class="card-body d-flex flex-column">
                                <h5 class="card-title">User ID: ${submission.userId}</h5>
                                <p class="card-text"><strong>Type:</strong> Text</p>
                                <p class="card-text"><strong>Section:</strong> ${submission.section}</p>
                                <p class="card-text"><strong>Workshop:</strong> ${submission.workshop}</p>
                                <div class="card-text" style="max-height: 150px; overflow-y: auto;">
                                    <strong>Content:</strong><br>
                                    ${submission.content.replace(/\n/g, '<br>')}
                                </div>
                                <p class="card-text"><strong>Timestamp:</strong> ${submission.timestamp.toLocaleString()}</p>
                                <p class="card-text mb-1"><strong>Votes:</strong> <span class="vote-count" data-submission-id="${submissionId.replace(/"/g, '&quot;')}">${voteCount}</span></p>
                                <div class="mt-auto d-flex flex-wrap gap-1">
                                    ${voteBtnHtml}
                                    ${unvoteBtnHtml}
                                    ${canDelete ? `
                                    <button class="btn btn-danger delete-text-btn" data-id="${submission.id}" data-user-id="${submission.userId}">
                                        <i class="fas fa-trash"></i> Delete
                                    </button>
                                    ` : '<span class="text-muted small">只能刪除自己的提交</span>'}
                                </div>
                            </div>
                        </div>
                    `;
                }

                container.appendChild(col);
            });

            // Add event listeners to delete buttons (only same user can delete)
            document.querySelectorAll('.delete-btn').forEach(button => {
                button.addEventListener('click', async (e) => {
                    const btn = e.currentTarget;
                    const filename = btn.dataset.filename;
                    const imageUserId = getUserIdFromFilename(filename);
                    const uid = localStorage.getItem('currentUserId');
                    if (!uid || imageUserId !== uid) {
                        alert('只能刪除自己的圖片。');
                        return;
                    }
                    if (confirm('Are you sure you want to delete this image?')) {
                        try {
                            const imageRef = ref(storage, `stories/${filename}`);
                            await deleteObject(imageRef);
                            loadImages();
                            alert('Image deleted successfully!');
                        } catch (error) {
                            console.error("Error deleting image:", error);
                            alert('Failed to delete image. Please try again.');
                        }
                    }
                });
            });

            document.querySelectorAll('.delete-text-btn').forEach(button => {
                button.addEventListener('click', async (e) => {
                    const btn = e.currentTarget;
                    if (btn.dataset.userId !== localStorage.getItem('currentUserId')) {
                        alert('只能刪除自己的提交。');
                        return;
                    }
                    if (confirm('Are you sure you want to delete this submission?')) {
                        const docId = btn.dataset.id;
                        try {
                            await deleteDoc(doc(db, 'submissions', docId));
                            loadTextSubmissions();
                            alert('Submission deleted successfully!');
                        } catch (error) {
                            console.error("Error deleting submission:", error);
                            alert('Failed to delete submission. Please try again.');
                        }
                    }
                });
            });

            // Vote: each user can vote 3 times, cannot vote for self; can unvote
            document.querySelectorAll('.vote-btn').forEach(button => {
                button.addEventListener('click', async (e) => {
                    const btn = e.currentTarget;
                    const voterId = localStorage.getItem('currentUserId');
                    if (!voterId) { alert('請先登入才能投票。'); return; }
                    const submissionId = btn.dataset.submissionId;
                    const targetUserId = btn.dataset.targetUserId;
                    if (voterId === targetUserId) { alert('不能投自己。'); return; }
                    if (userVotedSubmissionIds.size >= MAX_VOTES_PER_USER) { alert('你已用完 3 票。'); return; }
                    if (userVotedSubmissionIds.has(submissionId)) return;
                    try {
                        const voteRef = doc(db, 'votes', getVoteDocId(voterId, submissionId));
                        await setDoc(voteRef, {
                            voterId,
                            submissionId,
                            targetUserId,
                            type: btn.dataset.submissionType || 'image'
                        });
                        await loadVotes();
                    } catch (err) {
                        console.error('Vote error:', err);
                        alert('投票失敗，請重試。');
                    }
                });
            });

            document.querySelectorAll('.unvote-btn').forEach(button => {
                button.addEventListener('click', async (e) => {
                    const btn = e.currentTarget;
                    const voterId = localStorage.getItem('currentUserId');
                    if (!voterId) return;
                    const submissionId = btn.dataset.submissionId;
                    try {
                        const voteRef = doc(db, 'votes', getVoteDocId(voterId, submissionId));
                        await deleteDoc(voteRef);
                        await loadVotes();
                    } catch (err) {
                        console.error('Unvote error:', err);
                        alert('取消投票失敗，請重試。');
                    }
                });
            });
        }

        // Function to handle content type filter
        function handleContentTypeFilter() {
            filterAndDisplaySubmissions();
        }

        // Add event listeners for filters
        document.getElementById('userFilter').addEventListener('input', filterAndDisplaySubmissions);
        document.getElementById('workshopFilter').addEventListener('change', filterAndDisplaySubmissions);
        document.getElementById('userFilter').addEventListener('input', filterAndDisplaySubmissions);
        document.getElementById('workshopFilter').addEventListener('change', filterAndDisplaySubmissions);
        document.getElementById('contentTypeFilter').addEventListener('change', handleContentTypeFilter);

        // Load images when page loads
        loadImages();
        loadTextSubmissions();
    </script>

    <script src="" async defer></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
